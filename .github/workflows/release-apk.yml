name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release-apk:
    name: Build and upload release APK
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install compile SDK
        run: sdkmanager "platforms;android-36.1" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          test -n "$SIGNING_KEYSTORE_BASE64"
          test -n "$SIGNING_STORE_PASSWORD"
          test -n "$SIGNING_KEY_ALIAS"
          test -n "$SIGNING_KEY_PASSWORD"

      - name: Decode signing key
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/aramd-release.jks"
          echo "ANDROID_SIGNING_STORE_FILE=$RUNNER_TEMP/signing/aramd-release.jks" >> "$GITHUB_ENV"

      - name: Set version
        id: version
        run: |
          VERSION_NAME="${RELEASE_TAG#v}"
          APK_NAME="aramd-${RELEASE_TAG}.apk"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        env:
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare APK asset
        run: cp app/build/outputs/apk/release/app-release.apk "${{ steps.version.outputs.apk_name }}"

      - name: Verify APK signature
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs "${{ steps.version.outputs.apk_name }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes "Signed APK release for Obtainium."
          fi
          gh release upload "$RELEASE_TAG" "${{ steps.version.outputs.apk_name }}" --clobber
